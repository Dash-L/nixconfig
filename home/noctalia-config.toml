[backdrop]
blur_intensity = 0.34999999217689037
enabled = true

[bar.default]
end = [
    "tray",
    "notifications",
    "clipboard",
    "network",
    "bluetooth",
    "volume",
    "brightness",
    "battery",
    "control-center",
    "session"
]

[desktop_widgets]
enabled = false

[lockscreen_widgets]
enabled = false
schema_version = 2
widget_order = [ "lockscreen-login-box@eDP-1" ]

    [lockscreen_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [lockscreen_widgets.widget."lockscreen-login-box@eDP-1"]
    box_height = 70.0
    box_width = 400.0
    cx = 720.0
    cy = 841.0
    output = "eDP-1"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@eDP-1".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        input_opacity = 1.0
        input_radius = 6.0
        show_caps_lock = true
        show_keyboard_layout = true
        show_login_button = true
        show_password_hint = true

[theme]
builtin = "Catppuccin"

[wallpaper]
directory = "/home/dash/archive/wallpapers"

    [wallpaper.default]
    path = "/home/dash/archive/wallpapers/wallpaper.png"

    [wallpaper.last]
    path = "/home/dash/archive/wallpapers/wallpaper.png"

    [wallpaper.monitors.eDP-1]
    path = "/home/dash/archive/wallpapers/wallpaper.png"

[widget.clock]
format = "{:%I:%M:%S %p}"
